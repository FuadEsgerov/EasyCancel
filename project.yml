name: EasyCancel
options:
  bundleIdPrefix: app.easycancel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en
  knownRegions: [en, de, fr, es, it, nl, pl]
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
targets:
  EasyCancel:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "Resources/Info.plist"
    dependencies:
      - package: Supabase
        product: Supabase
    entitlements:
      path: Sources/Resources/EasyCancel.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.easycancel
        INFOPLIST_FILE: Sources/Resources/Info.plist
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  EasyCancelTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
      - path: Configuration.storekit
        buildPhase: resources
    dependencies:
      - target: EasyCancel
      - sdk: StoreKitTest.framework
schemes:
  EasyCancel:
    build:
      targets:
        EasyCancel: all
    run:
      config: Debug
      storeKitConfiguration: Configuration.storekit
    test:
      config: Debug
      targets:
        - EasyCancelTests
