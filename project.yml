name: EasyCancel
options:
  bundleIdPrefix: com.vincli
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en
  knownRegions: [en, de, fr, es, it, nl, pl]
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: 52N9GMM7Q6
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
targets:
  EasyCancel:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "Resources/Info.plist"
      - path: Shared
    dependencies:
      - package: Supabase
        product: Supabase
      - target: EasyCancelWidget
    entitlements:
      path: Sources/Resources/EasyCancel.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.security.application-groups:
          - group.com.vincli.easycancel
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vincli.easycancel
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Sources/Resources/Info.plist
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  EasyCancelTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
      - path: Configuration.storekit
        buildPhase: resources
    dependencies:
      - target: EasyCancel
      - sdk: StoreKitTest.framework
  EasyCancelUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [UITests]
    dependencies:
      - target: EasyCancel
    settings:
      base:
        TEST_TARGET_NAME: EasyCancel
  EasyCancelWidget:
    type: app-extension
    platform: iOS
    sources:
      - Widget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vincli.easycancel.widget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Widget/EasyCancelWidget.entitlements
        SWIFT_EMIT_LOC_STRINGS: YES
schemes:
  EasyCancel:
    build:
      targets:
        EasyCancel: all
    run:
      config: Debug
      storeKitConfiguration: Configuration.storekit
    test:
      config: Debug
      targets:
        - EasyCancelTests
        - EasyCancelUITests
